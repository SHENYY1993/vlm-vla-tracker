version: '3.8'

services:
  # MongoDB 数据库服务
  mongodb:
    image: mongo:7.0
    container_name: vlm-vla-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: vlm_vla_tracker
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    networks:
      - vlm-vla-network

  # 后端 FastAPI 服务
  backend:
    build:
      context: .
      target: backend
    container_name: vlm-vla-backend
    restart: unless-stopped
    environment:
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DB=vlm_vla_tracker
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    networks:
      - vlm-vla-network
    volumes:
      - ./backend:/app/backend:ro

  # 前端 Nginx 服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vlm-vla-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - vlm-vla-network
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  # 可选：MongoDB Express 管理界面
  mongo-express:
    image: mongo-express:latest
    container_name: vlm-vla-mongo-express
    restart: unless-stopped
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin123
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    networks:
      - vlm-vla-network

volumes:
  mongodb_data:
    driver: local

networks:
  vlm-vla-network:
    driver: bridge